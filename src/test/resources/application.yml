spring:
  application:
    name: tradingworld-test

trading:
  agents:
    selected-analysts: market,sentiment,news,fundamentals
    max-debate-rounds: 1
    max-risk-discuss-rounds: 1
    max-recur-limit: 10
  llm:
    provider: openai
    deep-think-model: gpt-4.5
    quick-think-model: gpt-4.5-mini
    output-language: English
  memory:
    bm25-k1: 1.5
    bm25-b: 0.75
    max-similarities: 3
  paths:
    results-dir: /tmp/tradingworld-test/results
    data-cache-dir: /tmp/tradingworld-test/cache

langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY:test-key}
    base-url: https://api.openai.com/v1
    model-name: gpt-4.5

logging:
  level:
    com.tradingworld: DEBUG
